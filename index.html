<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Reuniões de AA Hoje</title>
  <meta property="og:title" content="Reuniões de AA Hoje">
  <meta property="og:description" content="Encontre reuniões online de AA, reflexões diárias e grupos temáticos de forma rápida e prática.">
  <meta property="og:image" content="https://portalaltotiete.com.br/Portal%20guararema/admlana/foto/img_m/m_16425.jpg">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-D9M2TCHB20"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-D9M2TCHB20');
  </script>

  <link rel="stylesheet" href="style.css?v=11">
</head>
<body>
  <div class="container">
    <header class="main-header">
      <img src="https://portalaltotiete.com.br/Portal%20guararema/admlana/foto/img_m/m_16425.jpg" alt="Logo AA" class="header-logo">
      <h1>Reuniões de AA Hoje</h1>
    </header>

    <div class="layout-grid">
      <main class="card">
        <h2>Reuniões Restantes Hoje</h2>
        <div class="filters">
          <button onclick="applyFilter('PT')"><img src="https://flagcdn.com/w20/br.png" alt="BR" class="btn-flag"> Português</button>
          <button onclick="applyFilter('EN')"><img src="https://flagcdn.com/w20/gb.png" alt="UK" class="btn-flag"> English</button>
          <button onclick="applyFilter('ES')"><img src="https://flagcdn.com/w20/es.png" alt="ES" class="btn-flag"> Español</button>
          <button onclick="applyFilter('ALL')">Todas</button>
        </div>
        <ul id="meetings-list">
          <p><em>Carregando reuniões...</em></p>
        </ul>
        <div id="pagination-controls" class="pagination"></div>
      </main>

      <aside class="card">
        <h2>Reflexão Diária</h2>
        <div id="daily-reflection">
          <p><em>Carregando reflexão do dia...</em></p>
        </div>
      </aside>
    </div>

    <section class="card banner-section">
      <h2>Próximas Reuniões Temáticas</h2>
      <div id="thematic-meetings-list" class="thematic-banner"></div>
    </section>
  </div>

  <button class="floating-share-btn" onclick="sharePage()" title="Compartilhar Página">
    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
  </button>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="script.js?v=11"></script>
</body>
</html>
